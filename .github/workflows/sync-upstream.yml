name: Sync Upstream Usecases

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh tests/*.sh

      - name: Sync and rebuild docs
        run: scripts/fetch_and_build.sh --work-dir /tmp/openclaw-auto-sync --clean-work-dir

      - name: Build PR body
        run: |
          total=$(jq -r '.totals.overall' docs/USECASES.json)
          source_a=$(jq -r '.totals.source_a' docs/USECASES.json)
          source_b=$(jq -r '.totals.source_b' docs/USECASES.json)
          generated_at=$(jq -r '.generated_at' docs/USECASES.json)
          diff_new=$(jq -r '.totals.new_count' docs/DIFF.json)
          diff_updated=$(jq -r '.totals.updated_count' docs/DIFF.json)
          diff_removed=$(jq -r '.totals.removed_count' docs/DIFF.json)
          quickstart_count=$(jq -r '.selected_count' docs/QUICKSTARTS.json)

          cat > /tmp/sync-pr-body.md <<BODY
          ## Automated Upstream Sync

          This PR updates generated artifacts from upstream OpenClaw usecase repositories.

          - Generated At: ${generated_at}
          - Total Usecases: ${total}
          - Source A: ${source_a}
          - Source B: ${source_b}
          - NEW: ${diff_new}
          - UPDATED: ${diff_updated}
          - REMOVED: ${diff_removed}
          - Top Quickstarts: ${quickstart_count}

          Files updated by automation:
          - docs/USECASES.md
          - docs/USECASES.json
          - docs/STATS.md
          - docs/SOURCES.md
          - docs/DIFF.md
          - docs/DIFF.json
          - docs/QUICKSTARTS.md
          - docs/QUICKSTARTS.json
          BODY

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: sync upstream OpenClaw usecases"
          title: "chore: sync upstream OpenClaw usecases"
          body-path: /tmp/sync-pr-body.md
          branch: chore/auto-sync-usecases
          delete-branch: true
          labels: |
            automated
            data-sync
