name: Sync Upstream Usecases

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh tests/*.sh

      - name: Sync and rebuild docs
        run: scripts/fetch_and_build.sh --work-dir /tmp/openclaw-auto-sync --clean-work-dir

      - name: Publish workflow summary
        run: |
          total=$(jq -r '.totals.overall' docs/USECASES.json)
          source_a=$(jq -r '.totals.source_a' docs/USECASES.json)
          source_b=$(jq -r '.totals.source_b' docs/USECASES.json)
          generated_at=$(jq -r '.generated_at' docs/USECASES.json)
          diff_new=$(jq -r '.totals.new_count' docs/DIFF.json)
          diff_updated=$(jq -r '.totals.updated_count' docs/DIFF.json)
          diff_removed=$(jq -r '.totals.removed_count' docs/DIFF.json)

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Upstream Sync Summary
          - Generated: ${generated_at}
          - Total: ${total} (A: ${source_a}, B: ${source_b})
          - Changes: +${diff_new} new, ~${diff_updated} updated, -${diff_removed} removed
          EOF

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs usecases
          git commit -m "chore: sync upstream OpenClaw usecases"
          git push
