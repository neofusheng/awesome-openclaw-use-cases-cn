name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh tests/*.sh

      - name: Run quality gates
        run: bash scripts/run_quality_gates.sh --commands lint,test,build
